<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 𓆩𝐙𝐀𝐈𝐃𝐈-𝐌𝐃𓆪 ⚜️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   💎 ULTRA-PREMIUM TRANSPARENT SYSTEM WITH CUSTOM BACKGROUND IMAGE 💎
   ========================================================================== */

/* --- Core Reset & Variable Matrix --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body, html {
    user-select: auto;
    -webkit-user-select: auto;
}

:root {
    --gold-primary: #bf953f;
    --gold-light: #fcf6ba;
    --gold-dark: #aa771c;
    --gold-shadow: rgba(170, 119, 28, 0.35);
    --border-glow: rgba(212, 175, 55, 0.4);
    --font-premium-serif: 'Cinzel', serif;
    --font-premium-sans: 'Montserrat', sans-serif;
}

::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, var(--gold-dark), var(--gold-light));
    border-radius: 10px;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-premium-sans);
    background: url('https://files.catbox.moe/tguf7z.jpg') center/cover no-repeat fixed;
    padding: 30px 20px;
    overflow-x: hidden;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    pointer-events: none;
    z-index: 1;
}

.card {
    width: 100%;
    max-width: 420px;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px;
    padding: 45px 30px;
    text-align: center;
    border: 2px solid var(--border-glow);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7), 0 0 30px rgba(212, 175, 55, 0.15);
    position: relative;
    z-index: 2;
    animation: cardFadeIn 1s ease-out;
}

@keyframes cardFadeIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- Header --- */
.brand-header {
    margin-bottom: 25px;
}

.brand-header .icon-main {
    font-size: 48px;
    display: block;
    margin-bottom: 5px;
}

.brand-header h1 {
    font-family: var(--font-premium-serif);
    font-weight: 900;
    font-size: 26px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-primary), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
}

.brand-header .sub-head {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
}

/* --- Input Section --- */
.input-section {
    margin: 30px 0 20px;
}

.input-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 1px;
    margin-bottom: 12px;
}

.input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 50px;
    border: 1px solid rgba(212, 175, 55, 0.25);
    transition: all 0.3s ease;
    overflow: hidden;
}

.input-wrapper:focus-within {
    border-color: var(--gold-primary);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
}

.input-wrapper .country-code {
    padding: 0 0 0 18px;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold-light);
    background: transparent;
    border: none;
    outline: none;
    opacity: 0.7;
}

.input-wrapper input {
    flex: 1;
    padding: 16px 18px 16px 8px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    font-family: var(--font-premium-sans);
    letter-spacing: 0.5px;
}

.input-wrapper input::placeholder {
    color: rgba(255, 255, 255, 0.25);
    font-weight: 300;
    font-size: 14px;
}

/* --- Checkbox --- */
.force-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 15px 0 20px;
}

.force-section input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--gold-primary);
    cursor: pointer;
    filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2));
}

.force-section label {
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: color 0.3s;
}

.force-section label:hover {
    color: var(--gold-light);
}

/* --- Button --- */
.btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary), var(--gold-light));
    border: none;
    border-radius: 50px;
    font-family: var(--font-premium-serif);
    font-weight: 700;
    font-size: 18px;
    color: #0a0a0a;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.25);
    text-transform: uppercase;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(212, 175, 55, 0.4);
}

.btn-primary:active {
    transform: scale(0.97);
}

/* --- Code Display --- */
.code-display {
    margin: 25px 0 15px;
    padding: 20px 15px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 20px;
    border: 1px solid rgba(212, 175, 55, 0.15);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s ease;
    cursor: pointer;
    position: relative;
}

.code-display:hover {
    border-color: rgba(212, 175, 55, 0.35);
    background: rgba(0, 0, 0, 0.5);
}

.code-display .code-text {
    font-family: 'Courier New', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 5px;
    word-break: break-all;
    text-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
    transition: all 0.3s ease;
}

.code-display .click-hint {
    position: absolute;
    bottom: 6px;
    right: 14px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.15);
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* --- Message Box --- */
.message-box {
    min-height: 30px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    margin: 5px 0 15px;
    transition: all 0.3s ease;
}

/* --- Footer --- */
.footer {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.footer .meta-node-row {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 2px;
    font-weight: 300;
}

.footer .brand-stamp-line {
    font-family: var(--font-premium-serif);
    font-size: 13px;
    font-weight: 600;
    color: rgba(212, 175, 55, 0.3);
    letter-spacing: 2px;
    margin-top: 8px;
}

.footer .core-anchor-symbol {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0.3;
}

/* --- Responsive --- */
@media (max-width: 480px) {
    .card { padding: 30px 18px; }
    .brand-header h1 { font-size: 22px; }
    .code-display .code-text { font-size: 20px; letter-spacing: 3px; }
    .btn-primary { font-size: 16px; padding: 14px; }
}
</style>
</head>
<body>

<div class="card">

    <!-- Header -->
    <div class="brand-header">
        <span class="icon-main">⚜️</span>
        <h1>Zahid MD</h1>
        <div class="sub-head">Pair &amp; Connect</div>
    </div>

    <!-- Input -->
    <div class="input-section">
        <span class="input-label">✨ Apna WhatsApp Number Likhiye ✨</span>
        <div class="input-wrapper">
            <span class="country-code">+92</span>
            <input type="tel" id="number" placeholder="3XX XXXXXXX" inputmode="numeric" autocomplete="off">
        </div>
    </div>

    <!-- Force Re-Pair -->
    <div class="force-section">
        <input type="checkbox" id="forceCheck">
        <label for="forceCheck">Force Re‑Pair (clear old session)</label>
    </div>

    <!-- Get Code Button -->
    <button class="btn-primary" onclick="getCode()">Code Hasil Kren</button>

    <!-- Code Display -->
    <div class="code-display" id="borderBox" style="display: none;" onclick="copyCodeFromTerminal()">
        <span class="code-text" id="codeBox">—</span>
        <span class="click-hint">tap to copy</span>
    </div>

    <!-- Message Box -->
    <div class="message-box" id="messageBox"></div>

    <!-- Footer -->
    <div class="footer">
        <p class="meta-node-row">🔮 © POWERED BY M ZAHID 🔮</p>
        <p class="brand-stamp-line">⚜️ Zahid-MD Mini Bot Edition 2026 ⚜️</p>
        <div class="core-anchor-symbol">✨</div>
    </div>

</div>

<script>
// Global variable taake asli code ko save rakha ja sake
let currentGeneratedCode = "";

async function getCode() {
    const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
    const force = document.getElementById("forceCheck").checked;
    const codeBox = document.getElementById("codeBox");
    const borderBox = document.getElementById("borderBox");
    const messageBox = document.getElementById("messageBox");

    // Reset message
    messageBox.innerText = '';
    messageBox.style.color = 'rgba(255,255,255,0.6)';

    if (!num) {
        borderBox.style.display = "block";
        codeBox.style.letterSpacing = "normal";
        codeBox.style.color = "#ff4d4d";
        codeBox.innerText = "❌ APNA WHATSAPP NUMBER THIK SE LIKHIYE !";
        currentGeneratedCode = "";
        return;
    }

    borderBox.style.display = "block";
    codeBox.style.letterSpacing = "normal";
    codeBox.style.color = "#fff";
    codeBox.innerText = "⏳ SERVER SE CONNECT HO RAHA HAI.....";
    currentGeneratedCode = "";

    // Build URL with optional force parameter
    let url = `/code?number=${num}`;
    if (force) url += '&force=true';

    try {
        const res = await fetch(url);
        const data = await res.json();

        // Check for already connected status
        if (data.status === 'already_connected') {
            codeBox.style.color = "#ffaa00";
            codeBox.style.letterSpacing = "normal";
            codeBox.innerText = "⚠️ ALREADY CONNECTED";
            messageBox.innerText = "💡 Try checking 'Force Re‑Pair' and try again.";
            messageBox.style.color = "#ffaa00";
            return;
        }

        // Check for connection in progress
        if (data.status === 'connection_in_progress') {
            codeBox.style.color = "#ffaa00";
            codeBox.style.letterSpacing = "normal";
            codeBox.innerText = "⏳ CONNECTION IN PROGRESS";
            messageBox.innerText = "⏳ Please wait, already processing...";
            messageBox.style.color = "#ffaa00";
            return;
        }

        // Check for code
        if (data.code) {
            codeBox.style.letterSpacing = "5px";
            codeBox.style.color = "#fcf6ba";
            codeBox.innerText = "🔑 " + data.code;
            currentGeneratedCode = data.code;
            messageBox.innerText = "✅ Enter this code in WhatsApp › Linked Devices";
            messageBox.style.color = "#4caf50";
        } else if (data.error) {
            codeBox.style.color = "#ff4d4d";
            codeBox.innerText = "❌ " + (data.message || "Error");
            messageBox.innerText = "⚠️ " + data.error;
            messageBox.style.color = "#ff4d4d";
        } else {
            codeBox.style.color = "#ff4d4d";
            codeBox.innerText = "⚠️ SERVER FULL HAI !";
            messageBox.innerText = "Try force re-pair or try again later.";
            messageBox.style.color = "#ff4d4d";
        }
    } catch (e) {
        borderBox.style.display = "block";
        codeBox.style.color = "#ff4d4d";
        codeBox.innerText = "⚠️ NETWORK ERROR";
        messageBox.innerText = "Check your internet connection.";
        messageBox.style.color = "#ff4d4d";
    }
}

// Copy code on click
function copyCodeFromTerminal() {
    const codeBox = document.getElementById("codeBox");
    if (!currentGeneratedCode) return;

    navigator.clipboard.writeText(currentGeneratedCode).then(() => {
        const originalText = codeBox.innerText;
        const originalColor = codeBox.style.color;
        const originalSpacing = codeBox.style.letterSpacing;

        codeBox.innerText = "📋 COPIED HO GAYA !";
        codeBox.style.color = "#00ffcc";
        codeBox.style.letterSpacing = "normal";

        setTimeout(() => {
            codeBox.innerText = originalText;
            codeBox.style.color = originalColor;
            codeBox.style.letterSpacing = originalSpacing;
        }, 1500);
    }).catch(() => {
        // fallback: select text manually
    });
}

// Enter key support
document.getElementById("number").addEventListener("keydown", (e) => {
    if (e.key === "Enter") getCode();
});
</script>

</body>
</html>
