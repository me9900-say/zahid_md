<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 𓆩𝐙𝐀𝐈𝐃𝐈-𝐌𝐃𓆪 ⚜️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Montserrat:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   💎 ULTRA-PREMIUM TRANSPARENT SYSTEM WITH AUTO-COPY INTEGRATION 💎
   ========================================================================== */

/* --- Core Reset & Variable Matrix --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --gold-primary: #bf953f;
    --gold-light: #fcf6ba;
    --gold-dark: #aa771c;
    --gold-shadow: rgba(170, 119, 28, 0.35);
    --border-glow: rgba(212, 175, 55, 0.4);
    --font-premium-serif: 'Cinzel', serif;
    --font-premium-sans: 'Montserrat', sans-serif;
}

/* --- Smooth Custom Scrollbar for Luxury Aesthetics --- */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, var(--gold-dark), var(--gold-light));
    border-radius: 10px;
}

/* --- Main Background with User Provided Image Link Fix --- */
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-premium-sans);
    /* Background Image setup configured properly */
    background-image: url('https://files.catbox.moe/tguf7z.jpg') !important;
    background-position: center center !important;
    background-size: cover !important;
    background-repeat: no-repeat !important;
    background-attachment: fixed !important;
    padding: 30px 20px;
    overflow-x: hidden;
    position: relative;
}

/* --- Fully Transparent Premium Card Frame Without Solid Backgrounds --- */
.card {
    width: 100%;
    max-width: 420px;
    /* Mukammal text background clear look */
    background: rgba(0, 0, 0, 0.3) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 45px 30px;
    text-align: center;
    border: 2px solid var(--border-glow);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.8);
    position: relative;
    z-index: 10;
    overflow: hidden;
    animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
}

@keyframes cardEntrance {
    0% { opacity: 0; transform: translateY(40px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* --- Elite Metallic Liquid Gold Typography (No Text Background Interferences) --- */
.gold-text-liquid {
    background: linear-gradient(135deg, 
                #a67c00 0%, 
                #bf953f 25%, 
                #fcf6ba 50%, 
                #b38728 75%, 
                #fbf5b7 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    font-weight: 900;
    animation: shineText 4s linear infinite;
}

@keyframes shineText {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

h1.brand-title {
    font-family: var(--font-premium-serif);
    font-size: 2.3rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.9));
}

h1.operation-title {
    font-family: var(--font-premium-sans);
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: 5px;
    margin-bottom: 20px;
    opacity: 0.95;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
}

/* --- Decorative Corner Accents --- */
.card-decor {
    position: absolute;
    font-size: 0.8rem;
    color: var(--gold-primary);
    opacity: 0.4;
}
.decor-tl { top: 20px; left: 20px; }
.decor-tr { top: 20px; right: 20px; }
.decor-bl { bottom: 20px; left: 20px; }
.decor-br { bottom: 20px; right: 20px; }

/* --- Subtext Instruction System --- */
.instruction-panel {
    margin-bottom: 30px;
}

.gold-subtext-roman {
    color: #ffdca1;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 2px 5px rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

/* --- High-End Input Module Design --- */
.neon-rainbow-shell {
    padding: 2.5px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff4e50, #f9d423, #00b4db, #0083b0, #7f00ff, #ff4e50);
    background-size: 400% 400%;
    width: 100%;
    margin: 0 auto 25px auto;
    box-shadow: 0 12px 30px rgba(0,0,0,0.7);
    animation: borderFlow 8s ease infinite;
}

@keyframes borderFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.input-positioner {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
}

input.premium-roman-input {
    width: 100%;
    border: none;
    outline: none;
    padding: 18px 50px 18px 20px;
    border-radius: 18px;
    background: rgba(10, 15, 12, 0.88);
    color: #ffffff;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-family: var(--font-premium-sans);
    transition: background 0.3s;
}

input.premium-roman-input:focus {
    background: rgba(15, 25, 20, 0.95);
}

input.premium-roman-input::placeholder {
    color: #5c6e62;
    font-weight: 500;
    letter-spacing: 1px;
}

/* --- Decorative Keypad Matrix Icon --- */
.luxury-matrix-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5px;
    opacity: 0.6;
    transition: opacity 0.3s;
}

.luxury-matrix-icon span {
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    border-radius: 1.5px;
}

/* --- Heavy Solid Brushed Gold Trigger Button --- */
button.brushed-gold-trigger {
    width: 100%;
    border: none;
    outline: none;
    border-radius: 20px;
    padding: 18px;
    font-family: var(--font-premium-sans);
    font-size: 1.15rem;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, 
                #a67c00 0%, 
                #bf953f 30%, 
                #fcf6ba 50%, 
                #bf953f 70%, 
                #aa771c 100%);
    background-size: 200% auto;
    color: #050806;
    text-shadow: 0 1px 1px rgba(255,255,255,0.5);
    box-shadow: 0 8px 30px var(--gold-shadow), 
                inset 0 2px 4px rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 35px;
}

button.brushed-gold-trigger:hover {
    transform: translateY(-3px);
    background-position: right center;
    box-shadow: 0 12px 35px rgba(212, 175, 55, 0.6);
}

/* --- Output Display Terminal Configuration --- */
.output-terminal-wrapper {
    padding: 2.5px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    width: 100%;
    margin: 0 auto 15px auto;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

.terminal-inner-monitor {
    background: rgba(5, 10, 6, 0.93);
    color: #ffffff;
    border-radius: 18px;
    width: 100%;
    padding: 18px;
    text-align: center;
    font-weight: 700;
    font-size: 1.3rem;
    font-family: var(--font-premium-sans);
    border: 1px solid rgba(255,255,255,0.05);
    text-shadow: 0 0 8px rgba(255,255,255,0.4);
}

/* --- Luxury Copy Button Design --- */
button.premium-copy-btn {
    width: 100%;
    max-width: 240px;
    border: 1px solid var(--border-glow);
    outline: none;
    border-radius: 14px;
    padding: 10px 15px;
    font-family: var(--font-premium-sans);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    background: rgba(191, 149, 63, 0.15);
    color: #fcf6ba;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 5px auto 25px auto;
    display: none; /* Initially hidden */
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

button.premium-copy-btn:hover {
    background: rgba(191, 149, 63, 0.3);
    transform: scale(1.03);
}

/* --- Metatag Footprint Systems --- */
.system-meta-nodes {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-top: 15px;
}

.meta-node-row {
    font-size: 0.85rem;
    color: #ffe6b3;
    letter-spacing: 1.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

.brand-stamp-line {
    font-size: 0.78rem;
    color: #a3b8aa;
    margin-top: 20px;
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

.core-anchor-symbol {
    margin-top: 30px;
    font-size: 1.8rem;
    display: inline-block;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: floatingOrb 4s ease-in-out infinite;
}

@keyframes floatingOrb {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}
</style>
</head>
<body>

<div class="card">

    <div class="card-decor decor-tl">✦</div>
    <div class="card-decor decor-tr">✦</div>
    <div class="card-decor decor-bl">✦</div>
    <div class="card-decor decor-br">✦</div>

    <h1 class="brand-title gold-text-liquid">⚜️ Zahid MD ⚜️</h1>
    <h1 class="operation-title gold-text-liquid">PAIR CODE</h1>

    <div class="instruction-panel">
        <p class="gold-subtext-roman">✨ Apna WhatsApp Number Likhiye ✨</p>
    </div>

    <div class="neon-rainbow-shell">
        <div class="input-positioner">
            <input type="text" id="number" class="premium-roman-input" placeholder="923237045919">
            <div class="luxury-matrix-icon">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <button class="brushed-gold-trigger" onclick="getCode()">🚀 Code Hasil Kren 🚀</button>

    <div class="output-terminal-wrapper" id="borderBox" style="display:none;">
        <div class="terminal-inner-monitor" id="codeBox">----</div>
    </div>

    <button id="copyBtn" class="premium-copy-btn" onclick="triggerCopy()">📋 Copy Code</button>

    <div class="system-meta-nodes">
        <p class="meta-node-row">⚡ WhatsApp Bot System ⚡</p>
        <p class="meta-node-row">🔮 POWERED BY Zahid-MD 🔮</p>
    </div>
    
    <p class="brand-stamp-line">⚜️ Zahid-MD Mini Bot Edition 2026 ⚜️</p>
    
    <div class="core-anchor-symbol">✨</div>
   
</div>

<script>
// Global variable to keep track of the clean code extracted
let activePairCode = "";

async function getCode() {
    const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
    const codeBox = document.getElementById("codeBox");
    const borderBox = document.getElementById("borderBox");
    const copyBtn = document.getElementById("copyBtn");

    // Reset Copy Button State on fresh click
    copyBtn.style.display = "none";
    activePairCode = "";

    // Agar number khali ya invalid hai
    if (!num) {
        borderBox.style.display = "block"; 
        codeBox.style.letterSpacing = "normal"; 
        codeBox.style.color = "#ff4d4d"; 
        codeBox.innerText = "❌ APNA WHATSAPP NUMBER THIK SE LIKHIYE !";
        return;
    }

    // Server Loading Status Setup
    borderBox.style.display = "block";
    codeBox.style.letterSpacing = "normal";
    codeBox.style.color = "#fff"; 
    codeBox.innerText = "⏳ SERVER SE CONNECT HO RAHA HAI.....";

    try {
        const res = await fetch(`/code?number=${num}`);
        const data = await res.json();
        
        if (data.code) {
            activePairCode = data.code; // Saving core data
            codeBox.style.letterSpacing = "5px"; 
            codeBox.style.color = "#fcf6ba"; 
            codeBox.innerText = "🔑 " + data.code;
            
            // Show the premium copy button only when code successfully arrives
            copyBtn.style.display = "block";
            copyBtn.innerText = "📋 Copy Code";
        } else {
            codeBox.style.color = "#ff4d4d";
            codeBox.innerText = "⚠️ SERVER FULL HAI !";
        }
    } catch (e) {
        codeBox.style.color = "#ff4d4d";
        codeBox.innerText = "⚠️ SERVER IS TIME FULL HAI !";
    }
}

// Dedicated copy function without touching required structure
function triggerCopy() {
    if (!activePairCode) return;
    
    navigator.clipboard.writeText(activePairCode).then(() => {
        const copyBtn = document.getElementById("copyBtn");
        copyBtn.innerText = "COPIED! ✅";
        
        setTimeout(() => {
            copyBtn.innerText = "📋 Copy Code";
        }, 2000);
    }).catch(err => {
        console.error("Copy operation failed", err);
    });
}

function copyCode(code) {

}

</script>
