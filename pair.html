<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 𓆩𝐙𝐀𝐈𝐃𝐈-𝐌𝐃𓆪 ⚜️</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=600;700;900&family=Montserrat:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   💎 ULTRA-PREMIUM TRANSPARENT SYSTEM WITH CUSTOM BACKGROUND IMAGE 💎
   ========================================================================== */

/* --- Core Reset & Variable Matrix --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

/* User select ko select karne ke liye allow kiya taake agar chrome ka apna system chalana ho to chale */
body, html {
    user-select: auto;
    -webkit-user-select: auto;
}

:root {
    --gold-primary: #bf953f;
    --gold-light: #fcf6ba;
    --gold-dark: #aa771c;
    --gold-shadow: rgba(170, 119, 28, 0.35);
    --border-glow: rgba(212, 175, 55, 0.4);
    --font-premium-serif: 'Cinzel', serif;
    --font-premium-sans: 'Montserrat', sans-serif;
}

/* --- Smooth Custom Scrollbar for Luxury Aesthetics --- */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, var(--gold-dark), var(--gold-light));
    border-radius: 10px;
}

/* --- Main Background with User Provided Image Link --- */
body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-premium-sans);
    background: url('https://files.catbox.moe/tguf7z.jpg') center/cover no-repeat fixed;
    padding: 30px 20px;
    overflow-x: hidden;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    pointer-events: none;
    z-index: 1;
}

/* --- Fully Transparent Premium Card Frame --- */
.card {
    width: 100%;
    max-width: 420px;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 40px;
    padding: 45px 30px;
    text-align: center;
    border: 2px solid var(--border-glow);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7), 
                inset 0 0 30px rgba(255, 255, 255, 0.05);
    position: relative;
    z-index: 10;
    overflow: hidden;
    animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
}

.card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255, 246, 186, 0.08), transparent);
    transform: rotate(45deg);
    transition: none;
    pointer-events: none;
    animation: shimmerSweep 7s infinite linear;
}

@keyframes cardEntrance {
    0% { opacity: 0; transform: translateY(40px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes shimmerSweep {
    0% { transform: translate(-30%, -30%) rotate(45deg); }
    100% { transform: translate(30%, 30%) rotate(45deg); }
}

/* --- Elite Metallic Liquid Gold Typography --- */
.gold-text-liquid {
    background: linear-gradient(135deg, 
                #a67c00 0%, 
                #bf953f 25%, 
                #fcf6ba 50%, 
                #b38728 75%, 
                #fbf5b7 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    font-weight: 900;
    animation: shineText 4s linear infinite;
}

@keyframes shineText {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

h1.brand-title {
    font-family: var(--font-premium-serif);
    font-size: 2.3rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
}

h1.operation-title {
    font-family: var(--font-premium-sans);
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: 5px;
    margin-bottom: 20px;
    opacity: 0.95;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
}

/* --- Decorative Corner Accents --- */
.card-decor {
    position: absolute;
    font-size: 0.8rem;
    color: var(--gold-primary);
    opacity: 0.4;
}
.decor-tl { top: 20px; left: 20px; }
.decor-tr { top: 20px; right: 20px; }
.decor-bl { bottom: 20px; left: 20px; }
.decor-br { bottom: 20px; right: 20px; }

/* --- Subtext Instruction System --- */
.instruction-panel {
    margin-bottom: 30px;
}

.gold-subtext-roman {
    color: #ffdca1;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

/* --- High-End Input Module Design --- */
.neon-rainbow-shell {
    padding: 2.5px;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff4e50, #f9d423, #00b4db, #0083b0, #7f00ff, #ff4e50);
    background-size: 400% 400%;
    width: 100%;
    margin: 0 auto 25px auto;
    box-shadow: 0 12px 30px rgba(0,0,0,0.7);
    animation: borderFlow 8s ease infinite;
}

@keyframes borderFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.input-positioner {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
}

input.premium-roman-input {
    width: 100%;
    border: none;
    outline: none;
    padding: 18px 50px 18px 20px;
    border-radius: 18px;
    background: rgba(10, 15, 12, 0.85);
    color: #ffffff;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-family: var(--font-premium-sans);
    transition: background 0.3s;
}

input.premium-roman-input:focus {
    background: rgba(15, 25, 20, 0.95);
}

input.premium-roman-input::placeholder {
    color: #5c6e62;
    font-weight: 500;
    letter-spacing: 1px;
}

/* --- Decorative Keypad Matrix Icon --- */
.luxury-matrix-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2.5px;
    opacity: 0.6;
    transition: opacity 0.3s;
}

input.premium-roman-input:focus + .luxury-matrix-icon {
    opacity: 1;
}

.luxury-matrix-icon span {
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    border-radius: 1.5px;
}

/* --- Heavy Solid Brushed Gold Trigger Button --- */
button.brushed-gold-trigger {
    width: 100%;
    border: none;
    outline: none;
    border-radius: 20px;
    padding: 18px;
    font-family: var(--font-premium-sans);
    font-size: 1.15rem;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, 
                #a67c00 0%, 
                #bf953f 30%, 
                #fcf6ba 50%, 
                #bf953f 70%, 
                #aa771c 100%);
    background-size: 200% auto;
    color: #050806;
    text-shadow: 0 1px 1px rgba(255,255,255,0.5);
    box-shadow: 0 8px 30px var(--gold-shadow), 
                inset 0 2px 4px rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 35px;
}

button.brushed-gold-trigger:hover {
    transform: translateY(-3px);
    background-position: right center;
    box-shadow: 0 12px 35px rgba(212, 175, 55, 0.6);
}

button.brushed-gold-trigger:active {
    transform: translateY(1px);
    box-shadow: 0 4px 15px var(--gold-shadow);
}

/* --- Output Display Terminal Configuration --- */
.output-terminal-wrapper {
    padding: 2.5px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    width: 100%;
    margin: 0 auto 35px auto;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    animation: borderPulse 3s ease-in-out infinite;
}

@keyframes borderPulse {
    0% { opacity: 0.9; }
    50% { opacity: 1; filter: drop-shadow(0 0 6px rgba(212,175,55,0.5)); }
    100% { opacity: 0.9; }
}

.terminal-inner-monitor {
    background: rgba(5, 10, 6, 0.9);
    color: #ffffff;
    border-radius: 18px;
    width: 100%;
    padding: 18px;
    text-align: center;
    font-weight: 700;
    font-size: 1.25rem;
    font-family: var(--font-premium-sans);
    border: 1px solid rgba(255,255,255,0.05);
    text-shadow: 0 0 8px rgba(255,255,255,0.4);
    cursor: pointer; /* User ko pata chale click ho sakta hai */
    user-select: text; /* Chrome par press karne ke liye select feature enable */
    -webkit-user-select: text;
}

/* --- Metatag Footprint Systems --- */
.system-meta-nodes {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-top: 15px;
}

.meta-node-row {
    font-size: 0.85rem;
    color: #ffe6b3;
    letter-spacing: 1.5px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

.brand-stamp-line {
    font-size: 0.78rem;
    color: #a3b8aa;
    margin-top: 20px;
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

/* --- Center-Aligned Floating Accent Icon --- */
.core-anchor-symbol {
    margin-top: 30px;
    font-size: 1.8rem;
    display: inline-block;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: floatingOrb 4s ease-in-out infinite;
}

@keyframes floatingOrb {
    0% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0); }
}
</style>
</head>
<body>

<div class="card">

    <div class="card-decor decor-tl">✦</div>
    <div class="card-decor decor-tr">✦</div>
    <div class="card-decor decor-bl">✦</div>
    <div class="card-decor decor-br">✦</div>

    <h1 class="brand-title gold-text-liquid">⚜️ Zahid MD ⚜️</h1>
    <h1 class="operation-title gold-text-liquid">PAIR CODE</h1>

    <div class="instruction-panel">
        <p class="gold-subtext-roman">✨ Apna WhatsApp Number Likhiye ✨</p>
    </div>

    <div class="neon-rainbow-shell">
        <div class="input-positioner">
            <input type="text" id="number" class="premium-roman-input" placeholder="923237045919">
            <div class="luxury-matrix-icon">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <button class="brushed-gold-trigger" onclick="getCode()">🚀 Code Hasil Kren 🚀</button>

    <div class="output-terminal-wrapper" id="borderBox" style="display:none;" onclick="copyCodeFromTerminal()">
        <div class="terminal-inner-monitor" id="codeBox">----</div>
    </div>

    <div class="system-meta-nodes">
        <p class="meta-node-row">⚡ WhatsApp Bot System ⚡</p>
        <p class="meta-node-row">🔮 © POWERED BY M ZAHID🔮</p>
    </div>
    
    <p class="brand-stamp-line">⚜️ Zahid-MD Mini Bot Edition 2026 ⚜️</p>
    
    <div class="core-anchor-symbol">✨</div>
   
</div>

<script>
// Global variable taake asli code ko save rakha ja sake
let currentGeneratedCode = "";

async function getCode() {
    const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
    const codeBox = document.getElementById("codeBox");
    const borderBox = document.getElementById("borderBox");

    if (!num) {
        borderBox.style.display = "block"; 
        codeBox.style.letterSpacing = "normal"; 
        codeBox.style.color = "#ff4d4d"; 
        codeBox.innerText = "❌ APNA WHATSAPP NUMBER THIK SE LIKHIYE !";
        currentGeneratedCode = "";
        return;
    }

    borderBox.style.display = "block";
    codeBox.style.letterSpacing = "normal";
    codeBox.style.color = "#fff"; 
    codeBox.innerText = "⏳ SERVER SE CONNECT HO RAHA HAI.....";
    currentGeneratedCode = "";

    try {
        const res = await fetch(`/code?number=${num}`);
        const data = await res.json();
        
        if (data.code) {
            codeBox.style.letterSpacing = "5px"; 
            codeBox.style.color = "#fcf6ba"; 
            codeBox.innerText = "🔑 " + data.code;
            currentGeneratedCode = data.code; // Code save kar liya bina icon ke copy karne ke liye
        } else {
            codeBox.style.color = "#ff4d4d";
            codeBox.innerText = "⚠️ SERVER FULL HAI !";
        }
    } catch (e) {
        codeBox.style.color = "#ff4d4d";
        codeBox.innerText = "⚠️ SERVER IS TIME FULL HAI !";
    }
}

// Ye function click karne par direct code clipboard mein bhej dega
function copyCodeFromTerminal() {
    const codeBox = document.getElementById("codeBox");
    
    // Agar koi code generated nahi hai ya loading chal rahi ho
    if (!currentGeneratedCode) return;

    // Clipboard API ka use karke copy kiya
    navigator.clipboard.writeText(currentGeneratedCode).then(() => {
        const originalText = codeBox.innerText;
        const originalColor = codeBox.style.color;
        const originalSpacing = codeBox.style.letterSpacing;

        // Visual alert feedback
        codeBox.innerText = "📋 COPIED HO GAYA !";
        codeBox.style.color = "#00ffcc";
        codeBox.style.letterSpacing = "normal";

        setTimeout(() => {
            codeBox.innerText = originalText;
            codeBox.style.color = originalColor;
            codeBox.style.letterSpacing = originalSpacing;
        }, 1500);
    }).catch(err => {
        // Fallback agar automatic copy block ho jaye browser ki wajah se
        console.log("Fallback selection activated.");
    });
}
</script>

</body>
</html>
